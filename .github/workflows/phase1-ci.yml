name: Phase 1 CI

on:
  pull_request:
  push:
    branches:
      - main
      - phase1-recovery
      - phase2a-multiregion-native-recommendations

permissions:
  contents: read

jobs:
  backend-pytest:
    name: Backend pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run backend tests
        run: python -m pytest -q

  frontend:
    name: Frontend typecheck, tests, build, and audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend typecheck
        run: npm run typecheck

      - name: Run frontend Vitest tests
        run: npm run test:unit

      - name: Build frontend
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev

  compose-config:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: BACKEND_ENV_FILE=backend/.env.example docker compose config