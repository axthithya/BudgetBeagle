services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.example}
    environment:
      DATABASE_URL: sqlite:////data/cost_detective.db
    volumes:
      - cost-db:/data

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  cost-db: